<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vôlei de Sexta</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* PALETA: VERDE E MARROM */
            --bg: #1a1c14; 
            --surface: rgba(28, 31, 22, 0.85); 
            --primary: #86efac; 
            --text: #f0f2ed; 
            --accent: #a16207; 
            --danger: #ef4444; 
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(19, 21, 13, 0.9);
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            /* IMAGEM DE FUNDO NA RAIZ */
            background: linear-gradient(rgba(19, 21, 13, 0.8), rgba(19, 21, 13, 0.8)), 
                        url('fundo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text); 
            margin: 0; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        header {
            display: flex; justify-content: space-between; align-items: center; padding: 10px 20px;
            background: rgba(19, 21, 13, 0.9); border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }

        /* Estilo para a logo do topo */
        .logo-container { display: flex; align-items: center; }
        .logo-img { height: 45px; width: auto; object-fit: contain; }

        .container { max-width: 1200px; margin: 15px auto; padding: 0 15px; display: flex; flex-direction: column; gap: 20px; }
        
        .glass-panel { 
            background: var(--surface); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); 
        }
        
        input { width: 100%; padding: 14px; margin-bottom: 10px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white; border-radius: 10px; font-size: 16px; }
        input:focus { border-color: var(--primary); outline: none; }

        button { padding: 14px 20px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: #062010; width: 100%; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-accent { background: var(--accent); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-ghost { background: transparent; border: 1px solid var(--glass-border); color: var(--text); padding: 8px 15px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 280px; object-fit: cover; }
        .card-info { padding: 15px; border-top: 1px solid var(--glass-border); }
        
        .skills-list { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
        .skill-item { display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 6px 10px; border-radius: 8px; font-size: 0.8rem; }
        .skill-stars { color: #fde047; }
        
        .badge-ovr { position: absolute; top: 12px; right: 12px; background: var(--primary); color: #062010; font-weight: 900; padding: 4px 10px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; }
        .score-display { font-size: 4rem; font-weight: 900; margin: 10px 0; display: flex; justify-content: center; gap: 15px; color: var(--primary); }
        
        .hist-item { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .hist-winner { color: var(--primary); font-weight: 800; font-size: 0.9rem; margin-bottom: 5px; }
        .hist-teams { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.8rem; opacity: 0.8; }

        .hidden { display: none !important; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1999; backdrop-filter: blur(5px); }
        #loginPanel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 350px; z-index: 2000; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #062010; padding: 12px 20px; border-radius: 50px; font-weight: bold; z-index: 3000; opacity: 0; transition: 0.3s; pointer-events: none; }
        #toast.show { opacity: 1; top: 40px; }
    </style>
</head>
<body>

<div id="overlay" class="overlay hidden" onclick="fecharLogin()"></div>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="Vôlei de Sexta" class="logo-img">
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
        <span id="userStatus" style="font-size: 10px; opacity: 0.6;">Visitante</span>
        <button id="btnLogin" class="btn-ghost" onclick="abrirLogin()">Acesso</button>
        <button id="btnLogout" class="btn-ghost hidden" onclick="logout()">Sair</button>
    </div>
</header>

<div class="container">
    <div id="loginPanel" class="glass-panel hidden">
        <h2 style="text-align: center; margin-top: 0;">Identificação</h2>
        <input type="password" id="senhaInput" placeholder="Senha">
        <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="mesaPanel" class="glass-panel hidden">
        <h2 style="margin-top:0; color: var(--primary);">⚖️ Arbitragem</h2>
        <div id="listaPresenca" style="max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border);"></div>
        <button class="btn-accent" style="width:100%; margin-top:15px;" onclick="gerarTimes()">🎲 Sortear Times</button>
        
        <div id="timesGeradosPanel" class="hidden" style="margin-top: 20px; border-top: 1px solid var(--glass-border); padding-top: 15px;">
            <div id="timesGrid" style="display: flex; gap: 10px;"></div>
            <button class="btn-primary" style="margin-top:15px;" onclick="iniciarPartida()">▶️ Iniciar Placar Live</button>
        </div>
    </div>

    <div id="placarPanel" class="glass-panel hidden" style="text-align: center;">
        <div class="score-display"><span id="ptsA">00</span><span>×</span><span id="ptsB">00</span></div>
        <div style="font-weight: 800; color: var(--accent); margin-bottom: 15px;">SETS: <span id="setsA">0</span> - <span id="setsB">0</span></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-primary" onclick="ponto('A')" style="height: 70px; font-size: 14px;">+1 TIME A</button>
            <button class="btn-accent" onclick="ponto('B')" style="height: 70px; font-size: 14px;">+1 TIME B</button>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="btn-ghost" onclick="desfazerPonto()" style="flex:1;">↩️ Errei</button>
            <button class="btn-danger" onclick="finalizarPartida()" style="flex:1;">🏁 Encerrar</button>
        </div>
    </div>

    <div id="adminPanel" class="glass-panel hidden">
        <h2 id="adminTitulo" style="margin-top:0; color: var(--primary);">⚙️ Gestão de Atletas</h2>
        <input type="hidden" id="editIndex" value="">
        <input type="text" id="nome" placeholder="Nome do Jogador">
        <div style="display: flex; gap: 10px;">
            <input type="number" id="numero" placeholder="Nº Camisa">
            <input type="text" id="foto" placeholder="Link da Foto">
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px;">
            <div><small>Ataque</small><input type="number" id="atk" step="0.5" value="3"></div>
            <div><small>Defesa</small><input type="number" id="def" step="0.5" value="3"></div>
            <div><small>Recepção</small><input type="number" id="rec" step="0.5" value="3"></div>
            <div><small>Saque</small><input type="number" id="sac" step="0.5" value="3"></div>
            <div><small>Levant.</small><input type="number" id="lev" step="0.5" value="3"></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-primary" style="flex: 2;" onclick="salvarJogador()">💾 Salvar Atleta</button>
            <button id="btnCancelarEdit" class="btn-ghost hidden" style="flex: 1;" onclick="cancelarEdicao()">Sair</button>
        </div>
    </div>

    <div class="glass-panel">
        <h2 style="margin-top:0; color: var(--primary);">🏆 Últimas Partidas</h2>
        <div id="historicoLista">
            <p style="opacity:0.5; font-size: 0.8rem;">Aguardando primeira partida...</p>
        </div>
        <div id="adminHistOps" class="hidden">
            <button onclick="limparHistorico()" class="btn-ghost" style="font-size:10px; margin-top:10px; border-color: var(--danger); color: var(--danger);">Limpar Histórico</button>
        </div>
    </div>

    <div class="glass-panel">
        <h2 style="margin-top:0; color: var(--primary);">🥇 Ranking do Grupo</h2>
        <div id="jogadoresGrid" class="grid"></div>
    </div>
</div>

<div id="toast">Notificação</div>

<script type="module">
    // ... seu script Firebase e funções window permanecem aqui ...
    // (Apenas certifique-se de manter o bloco script que você já tinha)
</script>

</body>
</html>
